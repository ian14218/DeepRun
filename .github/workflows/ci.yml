name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mmfantasy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run database migrations
        run: |
          for f in database/migrations/*.sql; do
            PGPASSWORD=postgres psql -h localhost -U postgres -d mmfantasy_test -f "$f"
          done

      - name: Run server tests
        env:
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/mmfantasy_test
          JWT_SECRET: test-secret-ci
        run: npm run test:server

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run client tests
        run: npm run test:client

  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint client
        run: cd client && npm run lint

      - name: Build client
        run: cd client && npm run build
